<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babbage Archives - Gallery</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
        }

        header {
            background-color: #2c3e50;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header .logo { color: white; font-size: 1.5rem; font-weight: bold; }
        header nav a { color: white; text-decoration: none; }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 { color: #2c3e50; margin-bottom: 30px; }

        /* --- Upload Box Section --- */
        .upload-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        input[type="file"] {
            padding: 10px;
            margin-right: 10px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background-color: #2980b9; }
        .clear-btn { background-color: #e74c3c; margin-left: 10px; }
        .clear-btn:hover { background-color: #c0392b; }

        /* --- Photo Display Grid --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .photo-card {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        .photo-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 4px;
        }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Archives of Babbage</div>
        <nav>
            <a href="index.html">← Back to Home</a>
        </nav>
    </header>

    <div class="container">
        <h1>📸 Photo Gallery Collection</h1>

        <div class="upload-box">
            <h3>Add New Classroom Photos</h3>
            <br>
            <input type="file" id="photoInput" accept="image/*" multiple>
            <button onclick="uploadPhotos()">Upload Images</button>
            <button onclick="clearAllPhotos()" class="clear-btn">Clear All</button>
        </div>

        <div class="grid" id="galleryGrid">
            </div>
    </div>

 <script type="module">
    // today we'll be using firebase omd (johan is gay)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // CONFG obj (no one touch this or else yu're gay)
    const firebaseConfig = {
        apiKey: "AIzaSyAhQzsmRi5W6wSqAYUahJo2wvxLitiTZaw",
        authDomain: "byron-archives.firebaseapp.com",
        projectId: "byron-archives",
        storageBucket: "byron-archives.firebasestorage.app",
        messagingSenderId: "260401854443",
        appId: "1:260401854443:web:87200289a87b1ff923cbae"
    };

    // 
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
        
    // weird shi had to use gemini for this srry its cnfusing -mateo
    window.uploadPhotos = async function() {
        const input = document.getElementById('photoInput');
        const files = input.files;

        if (files.length === 0) {
            alert('Please select an image file first!');
            return;
        }

        Array.from(files).forEach(file => {
            const reader = new FileReader();
            
            reader.onload = async function(e) {
                try {
                    // 🚀 This sends the photo data straight to the cloud!
                    await addDoc(collection(db, "photos"), {
                        src: e.target.result,
                        timestamp: Date.now()
                    });
                } catch (error) {
                    console.error("Error saving to cloud: ", error);
                }
            };
            reader.readAsDataURL(file);
        });

        alert('Photos uploaded to the cloud database!');
        input.value = ''; 
    }

    // yo i finally fixed the cloud omndasidfsgs
    onSnapshot(collection(db, "photos"), (snapshot) => {
        const grid = document.getElementById('galleryGrid');
        
        if (snapshot.empty) {
            grid.innerHTML = '<p style="grid-column: 1/-1; color: #7f8c8d;">No pictures added yet. Upload some above!</p>';
            return;
        }

        // Map each cloud document into our HTML card layout
        grid.innerHTML = snapshot.docs.map(doc => {
            const photo = doc.data();
            return `
                <div class="photo-card">
                    <img src="${photo.src}" alt="Class Memory">
                    <button class="delete-btn" onclick="deletePhoto('${doc.id}')">✕</button>
                </div>
            `;
        }).join('');
    });

    // 3. FUNCTION: Delete a single item from the cloud database using its ID
    window.deletePhoto = async function(id) {
        if (confirm('Delete this photo for everyone?')) {
            try {
                await deleteDoc(doc(db, "photos", id));
            } catch (error) {
                console.error("Error deleting document: ", error);
            }
        }
    }
</script>

        // 4. FUNCTION: Wipe out the whole list
        function clearAllPhotos() {
            if (confirm('Are you sure you want to delete every photo?')) {
                localStorage.setItem('photos', JSON.stringify([]));
                loadPhotos();
            }
        }
    </script>
</body>
</html>
