<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babbage Archives - Gallery</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
        }

        header {
            background-color: #2c3e50;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header .logo { color: white; font-size: 1.5rem; font-weight: bold; }
        header nav a { color: white; text-decoration: none; }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 { color: #2c3e50; margin-bottom: 30px; }

        /* --- Upload Box Section --- */
        .upload-box {
            background: rgba(68, 114, 255, 0.7);
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        input[type="file"] {
            padding: 10px;
            margin-right: 10px;
        }

        button {
            background-color: #1abc9c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
             background-color: #07ffcd;
             transform: translateY(-2px);
             box-shadow: 0 4px 10px rgba(255, 255, 255, 0.15); 
        }

        .clear-btn { background-color: #e74c3c; margin-left: 10px; }
        .clear-btn:hover { background-color: #c0392b; }

        /* --- Photo Display Grid --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .photo-card {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
            overflow: hidden;
        }

        .photo-card.active {
            overflow: visible;
            z-index: 99;
        }

        .photo-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 4px;
            opacity: 0.85; 
            filter: brightness(0.9);
            transition: transform 0.3s ease, opacity 0.3s ease, filter 0.3s ease;
        }
        
        .photo-card:hover img {
            transform: scale(1.08); 
            opacity: 1;
            filter: brightness(1);
            cursor: pointer;
        }

        .photo-detail-bubble {
            display: none; 
            position: absolute;
            top: 105%; 
            left: 5%;
            width: 90%; 
            background: #2c3e50; 
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            z-index: 10; 
            box-sizing: border-box;
        }

        .photo-detail-bubble::before {
            content: '';
            position: absolute;
            bottom: 100%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 8px;
            border-style: solid;
            border-color: transparent transparent #2c3e50 transparent;
        }

        .photo-detail-bubble img {
            width: 100% !important;
            height: auto !important; 
            max-height: 250px; 
            object-fit: contain !important; 
            border-radius: 4px;
            opacity: 1 !important;
            filter: brightness(1) !important;
            transform: none !important;
        }

        .photo-card.active .photo-detail-bubble {
            display: block;
        }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            z-index: 5;
        }

        .delete-btn:hover {
            background-color: #ff1900;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(255, 255, 255, 0.15);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Archives of Babbage</div>
        <nav>
            <a href="index.html">← Back to Home</a>
        </nav>
    </header>

    <div class="container">
        <h1> Gallery Collection</h1>

        <div class="upload-box">
            <h3>Add New Classroom Photos</h3>
            <br>
            <input type="file" id="photoInput" accept="image/*" multiple>
            <button onclick="uploadPhotos()">Upload Images</button>
            <button onclick="clearAllPhotos()" class="clear-btn">Clear All</button>
        </div>

        <div class="grid" id="galleryGrid"></div>
    </div>

 <script type="module">
    // today we'll be using firebase omd (johan is gay)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, deleteDoc, doc, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // CONFG obj (no one touch this or else yu're gay)
    const firebaseConfig = {
        apiKey: "AIzaSyAhQzsmRi5W6wSqAYUahJo2wvxLitiTZaw",
        authDomain: "byron-archives.firebaseapp.com",
        projectId: "byron-archives",
        storageBucket: "byron-archives.firebasestorage.app",
        messagingSenderId: "260401854443",
        appId: "1:260401854443:web:87200289a87b1ff923cbae"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
        
    // weird shi had to use gemini for this srry its cnfusing -mateo
    window.uploadPhotos = async function() {
        const input = document.getElementById('photoInput');
        const files = input.files;

        if (files.length === 0) {
            alert('Please select an image file first!');
            return;
        }

        let uploadCount = 0;

        Array.from(files).forEach(file => {
            const reader = new FileReader();
            
            reader.onload = function(e) {
                const img = new Image();
                img.src = e.target.result; // this has been killing me for 5 hours so please dont ruin this or else im killing you all, finally mobile phone users acn see
                
                img.onload = async function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    
                    const MAX_WIDTH = 1000;
                    const MAX_HEIGHT = 1000;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Force compress down to 60% JPEG quality
                    const compressedSrc = canvas.toDataURL('image/jpeg', 0.6);

                    try {
                        // 🚀 This sends the photo data straight to the cloud!
                        await addDoc(collection(db, "photos"), {
                            src: compressedSrc,
                            timestamp: Date.now()
                        });
                        
                        uploadCount++;
                        if (uploadCount === files.length) {
                            alert('Photos uploaded to the cloud database successfully!');
                            input.value = ''; 
                        }
                    } catch (error) {
                        console.error("Error saving to cloud: ", error);
                        alert('Firebase cloud upload failed.');
                    }
                };
            };
            reader.readAsDataURL(file);
        });
    }

    // yo i finally fixed the cloud omndasidfsgs
    onSnapshot(collection(db, "photos"), (snapshot) => {
        const grid = document.getElementById('galleryGrid');
        
        if (snapshot.empty) {
            grid.innerHTML = '<p style="grid-column: 1/-1; color: #7f8c8d;">No pictures added yet. Upload some above!</p>';
            return;
        }

        // Map each cloud document into our HTML card layout
        grid.innerHTML = snapshot.docs.map(doc => {
            const photo = doc.data();
            return `
                <div class="photo-card">
                    <img src="${photo.src}" alt="Class Memory">
                    <button class="delete-btn" onclick="deletePhoto('${doc.id}')">✕</button>
                    <div class="photo-detail-bubble">
                        <img src="${photo.src}" alt="Full view">
                    </div>
                </div>
            `;
        }).join('');
    });

    // 3. FUNCTION: Delete a single item from the cloud database using its ID
    window.deletePhoto = async function(id) {
        if (confirm('Delete this photo for everyone?')) {
            try {
                await deleteDoc(doc(db, "photos", id));
            } catch (error) {
                console.error("Error deleting document: ", error);
            }
        }
    }

    // 4. FUNCTION: Wipe out the whole list
    window.clearAllPhotos = async function() {
        if (confirm('Are you sure you want to delete every photo from the cloud database?')) {
            try {
                const querySnapshot = await getDocs(collection(db, "photos"));
                querySnapshot.forEach(async (document) => {
                    await deleteDoc(doc(db, "photos", document.id));
                });
            } catch (error) {
                console.error("Error clearing database: ", error);
            }
        }
    }

    document.getElementById('galleryGrid').addEventListener('click', (e) => {
        if (e.target.closest('.delete-btn') || e.target.closest('.photo-detail-bubble')) return;
        
        const card = e.target.closest('.photo-card');
        if (!card) return;

        const allCards = document.querySelectorAll('.photo-card');
        allCards.forEach(c => {
            if (c !== card) c.classList.remove('active');
        });

        card.classList.toggle('active');
    });
    </script>
</body>
</html>
