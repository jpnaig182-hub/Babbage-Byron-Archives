<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Babbage Archives - Gallery</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
        }

        header {
            background-color: #2c3e50;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header .logo { color: white; font-size: 1.5rem; font-weight: bold; }
        header nav a { color: white; text-decoration: none; }

        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }

        h1 { color: #2c3e50; margin-bottom: 30px; }

        /* --- Upload Box Section --- */
        .upload-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        input[type="file"] {
            padding: 10px;
            margin-right: 10px;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover { background-color: #2980b9; }
        .clear-btn { background-color: #e74c3c; margin-left: 10px; }
        .clear-btn:hover { background-color: #c0392b; }

        /* --- Photo Display Grid --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .photo-card {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
        }

        .photo-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 4px;
        }

        .delete-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Archives of Babbage</div>
        <nav>
            <a href="index.html">← Back to Home</a>
        </nav>
    </header>

    <div class="container">
        <h1>📸 Photo Gallery Collection</h1>

        <div class="upload-box">
            <h3>Add New Classroom Photos</h3>
            <br>
            <input type="file" id="photoInput" accept="image/*" multiple>
            <button onclick="uploadPhotos()">Upload Images</button>
            <button onclick="clearAllPhotos()" class="clear-btn">Clear All</button>
        </div>

        <div class="grid" id="galleryGrid">
            </div>
    </div>

    <script>
        // Load existing pictures automatically when page opens
        window.addEventListener('DOMContentLoaded', loadPhotos);

        // 1. FUNCTION: Process uploaded pictures and save them to localStorage
        function uploadPhotos() {
            const input = document.getElementById('photoInput');
            const files = input.files;

            if (files.length === 0) {
                alert('Please select an image file first!');
                return;
            }

            let photos = JSON.parse(localStorage.getItem('photos')) || [];
            let processedCounter = 0;

            // Loop through each file chosen
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    // Save image data to array
                    photos.push({
                        id: Date.now() + Math.random(),
                        src: e.target.result
                    });
                    processedCounter++;

                    // Once all files are fully loaded, save to storage
                    if (processedCounter === files.length) {
                        localStorage.setItem('photos', JSON.stringify(photos));
                        alert('Photos successfully saved!');
                        loadPhotos(); // Refresh grid display
                        input.value = ''; // Reset input
                    }
                };
                reader.readAsDataURL(file);
            });
        }

        // 2. FUNCTION: Fetch items from LocalStorage and render HTML code on page
        function loadPhotos() {
            const photos = JSON.parse(localStorage.getItem('photos')) || [];
            const grid = document.getElementById('galleryGrid');

            if (photos.length === 0) {
                grid.innerHTML = '<p style="grid-column: 1/-1; color: #7f8c8d;">No pictures added yet. Upload some above!</p>';
                return;
            }

            // Map each picture item into a card element block
            grid.innerHTML = photos.map(photo => `
                <div class="photo-card">
                    <img src="${photo.src}" alt="Class Memory">
                    <button class="delete-btn" onclick="deletePhoto(${photo.id})">✕</button>
                </div>
            `).join('');
        }

        // 3. FUNCTION: Remove a single item from the screen
        function deletePhoto(id) {
            let photos = JSON.parse(localStorage.getItem('photos')) || [];
            photos = photos.filter(p => p.id !== id);
            localStorage.setItem('photos', JSON.stringify(photos));
            loadPhotos();
        }

        // 4. FUNCTION: Wipe out the whole list
        function clearAllPhotos() {
            if (confirm('Are you sure you want to delete every photo?')) {
                localStorage.setItem('photos', JSON.stringify([]));
                loadPhotos();
            }
        }
    </script>
</body>
</html>
